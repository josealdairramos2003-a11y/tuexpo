<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU Expo 🚀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans">

    <!-- SECCIÓN DE AUTENTICACIÓN -->
    <div id="auth-container" class="flex flex-grow items-center justify-center p-4">
        
        <!-- CARD DE LOGIN -->
        <div id="login-card" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-b-8 border-blue-600 transition-all duration-300">
            <h1 class="text-4xl font-black text-blue-600 mb-2 text-center italic tracking-tighter">TU Expo</h1>
            <p class="text-gray-400 mb-8 text-center font-medium">¡Bienvenido de nuevo!</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Correo Electrónico</label>
                    <input type="email" id="login-email" class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Contraseña</label>
                    <input type="password" id="login-password" class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition">
                </div>
                <button id="btn-do-login" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 active:scale-95 transition">INGRESAR</button>
                
                <div class="relative flex py-3 items-center">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-4 text-gray-400 text-xs font-bold">¿ERES NUEVO?</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <button onclick="switchCard('register')" class="w-full bg-white text-blue-600 border-2 border-blue-600 p-3 rounded-xl font-bold hover:bg-blue-50 transition text-sm">CREAR CUENTA GRATIS</button>
            </div>
        </div>

        <!-- CARD DE REGISTRO -->
        <div id="register-card" class="hidden bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-b-8 border-green-500 transition-all duration-300">
            <h1 class="text-3xl font-black text-green-500 mb-2 text-center">Únete a TU Expo</h1>
            <p class="text-gray-400 mb-8 text-center font-medium">Crea tu espacio de exposición privado.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Correo para tu cuenta</label>
                    <input type="email" id="reg-email" placeholder="ejemplo@correo.com" class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-green-500 outline-none transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Contraseña (Mín. 6 caracteres)</label>
                    <input type="password" id="reg-password" class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-green-500 outline-none transition">
                </div>
                <button id="btn-do-register" class="w-full bg-green-500 text-white p-4 rounded-xl font-bold shadow-lg shadow-green-100 hover:bg-green-600 active:scale-95 transition text-sm">REGISTRARME AHORA</button>
                
                <button onclick="switchCard('login')" class="w-full text-gray-400 text-sm font-bold hover:text-blue-600 transition mt-2">← Ya tengo cuenta, volver</button>
            </div>
        </div>
    </div>

    <!-- SECCIÓN DASHBOARD (APP) -->
    <div id="app-section" class="hidden flex-grow container mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm">
            <div>
                <h2 class="text-2xl font-black text-blue-600 italic tracking-tighter">TU Expo</h2>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Nube de Presentaciones</p>
            </div>
            <button id="btn-logout" class="bg-gray-100 text-gray-500 px-4 py-2 rounded-lg font-bold text-xs hover:bg-red-50 hover:text-red-500 transition">CERRAR SESIÓN</button>
        </header>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="space-y-6">
                <!-- Panel Archivos -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="font-bold mb-4 text-gray-700 flex items-center">📁 Subir Archivo</h3>
                    <input type="file" id="file-input" class="block w-full text-xs text-gray-400 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-600 font-bold">
                    <button id="btn-upload" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-800 transition shadow-lg shadow-blue-50">Subir a mi nube</button>
                </div>

                <!-- Panel Enlaces -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="font-bold mb-4 text-gray-700 flex items-center">🔗 Enlace (Canva/Prezi)</h3>
                    <input type="text" id="link-name" placeholder="Nombre (ej: Mi Canva)" class="w-full p-3 bg-gray-50 rounded-xl mb-2 text-sm outline-none border border-transparent focus:border-green-500 transition">
                    <input type="url" id="link-url" placeholder="https://canva.com/..." class="w-full p-3 bg-gray-50 rounded-xl mb-4 text-sm outline-none border border-transparent focus:border-green-500 transition">
                    <button id="btn-add-link" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition shadow-lg shadow-green-50">Guardar Enlace</button>
                </div>
            </div>

            <!-- Listado de Contenido -->
            <div class="md:col-span-2">
                <div id="files-list" class="grid gap-4">
                    <!-- Contenido cargado vía JS -->
                </div>
            </div>
        </div>
    </div>

    <footer class="p-8 text-center text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em]">
        Desarrollado por <span class="text-blue-500">ADeN</span> | Ingeniería de Sistemas
    </footer>

    <script src="script.js"></script>
</body>
</html>
